name = "free-cloudflare-email"
main = "src/index.ts"
compatibility_date = "2024-10-31"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
binding = "ASSETS"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "email-system-db"
database_id = "5433a195-9596-4872-a41a-2f5fba08d360" # Replace with your actual database ID after creating

# Email routing bindings
[[send_email]]
name = "SEND_EMAIL"

# Cron trigger for email cleanup
[triggers]
crons = ["0 2 * * *"] # <-- Set your cron expression here

# Environment variables
[vars]
ENVIRONMENT = "development"
ADMIN_TOKEN = "sadsa2121-DSds1_dsa" # Change this to a secure token
